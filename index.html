<!DOCTYPE html>
<html lang="sv"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Försäljningsdashboard – Innovative</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Exo:wght@600;700;800;900&family=Exo+2:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --purple:#461886;--pink:#CB29B4;--dark:#1B0638;--light:#F8FEFF;
  --blue:#5F73D6;--teal:#71D3C0;--mint:#A6F4C0;--peach:#EF9E89;--yellow:#F5DC80;
  --ink:#1B0638;--muted:#6B5E80;--line:#E5DEF0;--paper:#FFFFFF;--bg:#F8FEFF;
  --warn:#CB29B4;--ok:#2D8B6C;
}
body{font-family:'Exo 2',sans-serif;color:var(--ink);background:var(--bg);min-height:100vh}
body::before{content:'';position:fixed;top:0;left:0;right:0;height:340px;background:linear-gradient(135deg,#461886 0%,#CB29B4 100%);z-index:-1}
.wrap{max-width:1280px;margin:0 auto;padding:28px 22px 60px}
header{display:flex;justify-content:space-between;align-items:center;gap:20px;padding-bottom:24px;margin-bottom:24px;flex-wrap:wrap}
.brand{display:flex;gap:14px;align-items:center;color:#fff}
.brand svg{width:46px;height:46px}
h1{font-family:'Exo',sans-serif;font-weight:800;font-size:30px;line-height:1;letter-spacing:-.5px;color:#fff}
header p{color:rgba(255,255,255,.75);font-size:13px;margin-top:6px;font-family:'Exo 2'}
.tabs{display:flex;gap:6px;background:rgba(255,255,255,.15);padding:5px;border-radius:8px;backdrop-filter:blur(10px)}
.tabs button{font-family:'Exo',sans-serif;font-size:15px;font-weight:700;padding:9px 22px;border:none;background:transparent;color:#fff;cursor:pointer;border-radius:5px;transition:all .15s;letter-spacing:.02em}
.tabs button.on{background:#fff;color:var(--purple)}
.tabs button:not(.on):hover{background:rgba(255,255,255,.15)}
.uploadbar{display:flex;align-items:center;gap:16px;background:rgba(255,255,255,.95);border-radius:10px;padding:14px 16px;margin-bottom:22px;flex-wrap:wrap;box-shadow:0 4px 20px rgba(27,6,56,.15)}
#drop{flex:1;min-width:260px;border:1.5px dashed var(--line);border-radius:8px;padding:14px 16px;text-align:center;color:var(--muted);font-size:13px;cursor:pointer;transition:all .15s}
#drop.hot{border-color:var(--pink);background:#FFF3FE;color:var(--pink)}#drop b{color:var(--ink)}
.upbtn{font-family:'Exo',sans-serif;font-weight:700;font-size:14px;padding:10px 20px;background:linear-gradient(135deg,#461886 0%,#CB29B4 100%);color:#fff;border:none;border-radius:6px;cursor:pointer;letter-spacing:.02em}
.upbtn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(70,24,134,.3)}
.status{font-size:12.5px;color:var(--muted);min-width:120px;font-weight:500}
.status.ok{color:var(--ok)}.status.err{color:var(--warn)}.status.busy{color:var(--pink)}
.searchbar{margin-bottom:16px;position:sticky;top:0;background:var(--bg);padding:6px 0 12px;z-index:5}
.searchbar input{width:100%;font-family:'Exo 2';font-size:14px;padding:11px 16px;border:1.5px solid var(--line);border-radius:24px;background:#fff;color:var(--ink);transition:all .15s;box-shadow:0 2px 6px rgba(27,6,56,.04)}
.searchbar input:focus{outline:none;border-color:var(--pink);box-shadow:0 4px 14px rgba(203,41,180,.15)}
.layout{display:grid;grid-template-columns:220px 1fr;gap:22px;align-items:start;background:rgba(255,255,255,.98);border-radius:14px;padding:22px;box-shadow:0 8px 40px rgba(27,6,56,.12)}
@media(max-width:820px){.layout{grid-template-columns:1fr}}
.sidenav{position:sticky;top:80px;display:flex;flex-direction:column;gap:3px;background:linear-gradient(180deg,#F2E9FF 0%,#FFF3FE 100%);border-radius:10px;padding:12px}
.nav-h{font-family:'Exo',sans-serif;font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--purple);font-weight:700;padding:6px 10px 8px}
.sidenav button{text-align:left;font-family:'Exo 2';font-size:13.5px;font-weight:500;padding:9px 12px;border:none;background:transparent;color:var(--ink);cursor:pointer;border-radius:6px;transition:all .15s}
.sidenav button:hover{background:rgba(255,255,255,.6)}
.sidenav button.on{background:linear-gradient(135deg,#461886 0%,#CB29B4 100%);color:#fff;font-weight:600;box-shadow:0 3px 10px rgba(70,24,134,.3)}
.content{min-width:0}
.sec-title{font-family:'Exo',sans-serif;font-weight:800;font-size:24px;margin:4px 0 16px;letter-spacing:-.3px;color:var(--purple)}
.block{margin-bottom:36px;padding-bottom:18px;border-bottom:1px solid var(--line)}
.note{font-size:12.5px;color:var(--muted);margin:-8px 0 14px;font-style:italic}
.filterbar{display:flex;gap:18px;align-items:center;flex-wrap:wrap;background:#F2E9FF;border-radius:10px;padding:12px 16px;margin-bottom:18px}
.datefields{display:flex;gap:14px}
.datefields label,.mlab{display:flex;flex-direction:column;font-family:'Exo',sans-serif;font-size:10.5px;color:var(--purple);text-transform:uppercase;letter-spacing:.1em;gap:4px;font-weight:700}
.datefields input,#monthsel{font-family:'Exo 2';font-size:14px;padding:8px 12px;border:1.5px solid var(--line);border-radius:6px;background:#fff;color:var(--ink)}
.datefields input:focus,#monthsel:focus{outline:none;border-color:var(--pink)}
.presets{display:flex;gap:6px;flex-wrap:wrap}
.presets button{font-family:'Exo 2';font-size:12.5px;font-weight:500;padding:7px 14px;border:1.5px solid transparent;background:#fff;border-radius:20px;cursor:pointer;color:var(--purple);transition:all .12s}
.presets button:hover{border-color:var(--pink);color:var(--pink)}
.rangelabel{margin-left:auto;font-size:13px;color:var(--muted)}.rangelabel b{color:var(--ink);font-variant-numeric:tabular-nums;font-weight:600}
.monthnav{align-items:center}
.navarrow{font-size:14px;width:36px;height:36px;border:1.5px solid var(--line);background:#fff;border-radius:50%;cursor:pointer;color:var(--purple);transition:all .12s;display:grid;place-items:center;font-weight:700}
.navarrow:hover:not([disabled]){border-color:var(--pink);color:var(--pink);transform:translateY(-1px)}
.navarrow[disabled]{opacity:.3;cursor:default}
.monthnav .mlab{flex-direction:row;align-items:center;gap:8px;text-transform:none;letter-spacing:0;font-size:13px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:22px}
.card{position:relative;background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px 20px;overflow:hidden;transition:all .15s}
.card:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(27,6,56,.12)}
.card-bar{position:absolute;top:0;left:0;right:0;height:4px}
.card.total{background:linear-gradient(135deg,#F2E9FF 0%,#FFF3FE 100%)}
.card-h{font-family:'Exo',sans-serif;font-weight:700;font-size:15px;color:var(--purple);margin-top:6px;letter-spacing:.02em}
.card-net{font-family:'Exo',sans-serif;font-size:38px;font-weight:800;line-height:1.05;margin-top:10px;font-variant-numeric:tabular-nums;color:var(--ink)}
.card-sub{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-bottom:10px;font-weight:600}
.card-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-top:1px dotted var(--line)}
.card-row span{color:var(--muted)}.card-row b{font-variant-numeric:tabular-nums;font-weight:600}
.panel{background:#fff;border:1px solid var(--line);border-radius:10px;margin-bottom:18px;overflow:hidden}
.panel-h{font-family:'Exo',sans-serif;font-weight:700;font-size:16px;padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;color:var(--purple)}
.panel-h .count{margin-left:auto;font-family:'Exo 2';font-size:12px;color:var(--muted);font-weight:400}
.grpdot{width:10px;height:10px;border-radius:50%;display:inline-block}
.bars{display:flex;align-items:flex-end;gap:3px;height:150px;padding:16px 16px 8px;overflow-x:auto}
.bars.tall{height:200px}
.bar-col{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;min-width:18px;flex:1}
.bar{width:70%;border-radius:3px 3px 0 0;min-height:2px;transition:all .2s}
.bar-col:hover .bar{opacity:.85;transform:translateY(-2px)}
.bar-val{font-size:9.5px;color:var(--muted);margin-bottom:3px;font-variant-numeric:tabular-nums;white-space:nowrap;font-weight:600}
.bar-lbl{font-size:9px;color:var(--muted);margin-top:4px;font-weight:500}
.tables{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:1000px){.tables{grid-template-columns:1fr}}
table{width:100%;border-collapse:collapse;font-size:13.5px}
thead th{text-align:right;padding:11px 14px;font-family:'Exo',sans-serif;font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--purple);cursor:pointer;user-select:none;border-bottom:2px solid var(--line);white-space:nowrap;font-weight:700;background:#FAFAFC}
thead th:hover{color:var(--pink)}
th.lft,td.lft{text-align:left}
tbody td{padding:9px 14px;text-align:right;border-bottom:1px solid #F5F0FB;font-variant-numeric:tabular-nums}
tbody tr:hover{background:#F2E9FF}
.dayname{color:var(--muted);font-size:11px;margin-left:6px;text-transform:uppercase;letter-spacing:.05em}
td.warn{color:var(--warn);font-weight:600}td.netcell{font-weight:700;color:var(--purple)}
td.empty{text-align:center;color:var(--muted);padding:22px;font-style:italic}
tfoot td{padding:12px 14px;text-align:right;font-weight:700;background:linear-gradient(135deg,#F2E9FF 0%,#FFF3FE 100%);border-top:2px solid var(--purple);font-variant-numeric:tabular-nums;color:var(--ink)}
th.rank,td.rank{text-align:center;width:46px;font-weight:700}
tr.podium td{background:linear-gradient(90deg,#FFF3FE 0%,#fff 100%)}
tr.p0 td.rank{font-size:20px}tr.p1 td.rank,tr.p2 td.rank{font-size:17px}
tr.podium{border-left:3px solid var(--pink)}
.badge{display:inline-block;font-family:'Exo',sans-serif;font-size:10.5px;font-weight:700;color:#fff;padding:3px 11px;border-radius:20px;letter-spacing:.05em}
td.chgcell{text-align:right;font-variant-numeric:tabular-nums;font-size:12.5px}
.up{color:var(--ok);font-weight:700}.down{color:var(--warn);font-weight:700}
footer{margin-top:30px;padding-top:16px;font-size:11.5px;color:rgba(27,6,56,.5);text-align:center;font-family:'Exo 2'}
footer b{color:var(--purple)}

.subpanel{margin:14px 18px;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.subpanel-h{font-family:'Exo',sans-serif;font-weight:600;font-size:14px;padding:10px 14px;background:#FAFAFC;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px;color:var(--purple)}
.subpanel-h .count{margin-left:auto;font-family:'Exo 2';font-size:11px;color:var(--muted);font-weight:400}
.subpanel table{font-size:13px}
.subpanel tfoot td{padding:8px 14px}

// ---------- Excel parsing (mirrors the Python aggregation) ----------
function sidNorm(v){ if(v==null) return null; let s=String(v).trim(); if(s.endsWith('.0')) s=s.slice(0,-2); return s||null; }
function dstr(v){
  if(v instanceof Date && !isNaN(v)) {
    const y=v.getFullYear(), m=String(v.getMonth()+1).padStart(2,'0'), d=String(v.getDate()).padStart(2,'0');
    return `${y}-${m}-${d}`;
  }
  if(typeof v==='string'){ const m=v.match(/(\d{4})-(\d{2})-(\d{2})/); if(m) return `${m[1]}-${m[2]}-${m[3]}`; }
  return null;
}
function sheetToRows(wb, name){
  const ws=wb.Sheets[name]; if(!ws) return null;
  return XLSX.utils.sheet_to_json(ws, {header:1, raw:false, cellDates:true, defval:null});
}
function findCol(hdr, names){
  for(const want of names){
    for(let i=0;i<hdr.length;i++){ const h=hdr[i]; if(h!=null && String(h).trim().toLowerCase()===want.toLowerCase()) return i; }
  }
  return -1;
}

function parseB2B(wb){
  const ga=sheetToRows(wb,'GA sammanslagen'); if(!ga) return null;
  const gh=ga[0];
  const gA=findCol(gh,['Agent code']), gSN=findCol(gh,['Sales person name']),
        gSUB=findCol(gh,['Subscriber id']), gREG=findCol(gh,['Registration date']),
        gYM=findCol(gh,['SaleYM']), gNet=findCol(gh,['NetNC']);
  // subSA[sub] = [seller, agent, saleYM]
  const subSA={}; const sales={}; const cohort_sold={};
  for(let r=1;r<ga.length;r++){
    const row=ga[r]; if(!row) continue;
    const s=sidNorm(row[gSUB]), ag=(row[gA]==='A440'||row[gA]==='A443')?row[gA]:null;
    const d=dstr(row[gREG]), nm=row[gSN];
    const ym=row[gYM];
    const ymi=(typeof ym==='number'||/^\d+$/.test(String(ym)))?parseInt(ym):null;
    if(s&&nm) subSA[s]=[nm,row[gA],ymi];
    if(ag&&d&&nm){ const k=ag+'|'+nm+'|'+d; sales[k]=(sales[k]||0)+1; }
    if(ag&&nm&&ymi){ const k=ag+'|'+nm+'|'+ymi; cohort_sold[k]=(cohort_sold[k]||0)+1; }
  }
  // Ånger - EXCLUDE GDWL
  const an=sheetToRows(wb,'Ånger sammanslagen'); const ang={}; const cohort_regret={};
  if(an){ const ah=an[0];
    const aSUB=findCol(ah,['Subscriber id']), aDC=findCol(ah,['Disconnection date']),
          aDCODE=findCol(ah,['Disconnection code']);
    for(let r=1;r<an.length;r++){ const row=an[r]; if(!row) continue;
      // Filter out GDWL disconnections
      if(aDCODE>=0 && row[aDCODE]==='GDWL') continue;
      const s=sidNorm(row[aSUB]), d=dstr(row[aDC]);
      if(subSA[s]&&d){ const [nm,agent,sale_ym]=subSA[s];
        if(agent==='A440'||agent==='A443'){
          const k=agent+'|'+nm+'|'+d; ang[k]=(ang[k]||0)+1;
          if(sale_ym){ const ck=agent+'|'+nm+'|'+sale_ym; cohort_regret[ck]=(cohort_regret[ck]||0)+1; }
        }
      }
    }
  }
  // NC: per agent|seller|month -> [sumNet, cnt]
  const ncm={};
  for(let r=1;r<ga.length;r++){ const row=ga[r]; if(!row) continue;
    const ag=(row[gA]==='A440'||row[gA]==='A443')?row[gA]:null, nm=row[gSN];
    const ym=row[gYM], net=row[gNet];
    if(ag&&nm&&typeof net==='number'&&!isNaN(net)&&(typeof ym==='number'||/^\d+$/.test(String(ym)))){
      const k=ag+'|'+nm+'|'+parseInt(ym); ncm[k]=ncm[k]||[0,0]; ncm[k][0]+=net; ncm[k][1]+=1; } }
  const nc=Object.keys(ncm).map(k=>{const p=k.split('|');return [p[0],p[1],parseInt(p[2]),Math.round(ncm[k][0]),ncm[k][1]];});
  // cohort: union of sold and regret keys
  const allCohortKeys=new Set([...Object.keys(cohort_sold),...Object.keys(cohort_regret)]);
  const cohort=[...allCohortKeys].map(k=>{const p=k.split('|');return [p[0],p[1],parseInt(p[2]),cohort_sold[k]||0,cohort_regret[k]||0];});
  return {sales:kv(sales), anger:kv(ang), nc:nc, cohort:cohort, groups:['A440','A443'], hasNekade:false};
}

function parseB2C(wb){
  const fs=sheetToRows(wb,'Försäljning'); if(!fs) return null;
  const fh=fs[0];
  const iA=findCol(fh,['Agent code']), iAD=findCol(fh,['AD-login']),
        iSUB=findCol(fh,['Subscriber id']), iOD=findCol(fh,['Order date']), iG=findCol(fh,['Grupp']);
  // name column: header 'Säljarnamn'/'Namn' OR the unlabeled column right after AD-login
  let iNAME=findCol(fh,['Säljarnamn','Namn','Säljare']);
  if(iNAME<0 && iAD>=0){ const c=iAD+1; if(c<fh.length && (fh[c]==null||String(fh[c]).trim()==='')) iNAME=c; }
  // New classification: A445->A445 (FMC), A444->Kall, A443/A448->Forlangning
  const classify=ac=>{ if(ac==='A445')return 'A445'; if(ac==='A444')return 'Kall'; if(ac==='A443'||ac==='A448')return 'Forlangning'; return null; };
  const subNG={}; const sales={};
  for(let r=1;r<fs.length;r++){ const row=fs[r]; if(!row) continue;
    const s=sidNorm(row[iSUB]); let nm=(iNAME>=0?row[iNAME]:null)||row[iAD];
    let g=classify(row[iA]);
    const d=dstr(row[iOD]);
    if(s&&nm&&g){ nm=String(nm).trim(); subNG[s]=[nm,g]; }
    if(g&&d&&nm){ const k=g+'|'+String(nm).trim()+'|'+d; sales[k]=(sales[k]||0)+1; } }
  const an=sheetToRows(wb,'Ånger'); const ang={};
  if(an){ const ah=an[0]; const aSUB=findCol(ah,['Subscriber id']), aDC=findCol(ah,['Disconnection date']);
    for(let r=1;r<an.length;r++){ const row=an[r]; if(!row) continue;
      const s=sidNorm(row[aSUB]), d=dstr(row[aDC]);
      if(subNG[s]&&d){ const [nm,g]=subNG[s]; const k=g+'|'+nm+'|'+d; ang[k]=(ang[k]||0)+1; } } }
  const ne=sheetToRows(wb,'Nekade'); const nek={};
  if(ne){ const nh=ne[0]; const nSUB=findCol(nh,['Subscriber id']), nTD=findCol(nh,['Transaction date']);
    for(let r=1;r<ne.length;r++){ const row=ne[r]; if(!row) continue;
      const s=sidNorm(row[nSUB]), d=dstr(row[nTD]);
      if(subNG[s]&&d){ const [nm,g]=subNG[s]; const k=g+'|'+nm+'|'+d; nek[k]=(nek[k]||0)+1; } } }
  // cohort: per grupp|seller|month -> [sold, regretted, denied]
  const iYM=findCol(fh,['OrderYM']), iREG=findCol(fh,['Regretted']), iDEN=findCol(fh,['Denied']);
  const cohm={};
  for(let r=1;r<fs.length;r++){ const row=fs[r]; if(!row) continue;
    let nm=(iNAME>=0?row[iNAME]:null)||row[iAD];
    let g=classify(row[iA]);
    const ym=row[iYM];
    if(nm&&g&&ym!=null&&String(ym).trim()!==''){ nm=String(nm).trim();
      const k=g+'|'+nm+'|'+parseInt(ym); cohm[k]=cohm[k]||[0,0,0];
      cohm[k][0]+=1; if(row[iREG]==1)cohm[k][1]+=1; if(row[iDEN]==1)cohm[k][2]+=1; } }
  const cohort=Object.keys(cohm).map(k=>{const p=k.split('|');return [p[0],p[1],parseInt(p[2]),cohm[k][0],cohm[k][1],cohm[k][2]];});
  return {sales:kv(sales), anger:kv(ang), nekade:kv(nek), cohort:cohort, groups:['A445','Kall','Forlangning'], hasNekade:true};
}
function kv(o){ return Object.keys(o).map(k=>{ const p=k.split('|'); return [p[0],p[1],p[2],o[k]]; }); }

function detectAndParse(wb){
  const names=wb.SheetNames;
  if(names.includes('GA sammanslagen')) return {biz:'b2b', data:parseB2B(wb)};
  if(names.includes('Försäljning')) return {biz:'b2c', data:parseB2C(wb)};
  return null;
}

function allMonths(d){const s=new Set();
  d.sales.forEach(r=>s.add(r[2].slice(0,4)+r[2].slice(5,7)));
  (d.cohort||[]).forEach(r=>s.add(String(r[2])));
  (d.nc||[]).forEach(r=>s.add(String(r[2])));
  return [...s].map(Number).sort();}
function agg(rows,from,to){const bySeller={},byDay={};let total=0;
  for(const[g,s,dt,n]of rows){if(dt<from||dt>to)continue;
    (bySeller[g]=bySeller[g]||{})[s]=(bySeller[g][s]||0)+n;byDay[dt]=(byDay[dt]||0)+n;total+=n;}
  return{bySeller,byDay,total};}
function sortRows(rows){rows.sort((a,b)=> sortKey==='namn'?String(a.namn).localeCompare(String(b.namn),'sv')*(-sortDir):((a[sortKey]||0)-(b[sortKey]||0))*sortDir);return rows;}
function matchSearch(name){if(!state.search)return true;return String(name).toLowerCase().includes(state.search.toLowerCase());}

function tableHTML(cols,rows,totals){
  const head=cols.map(c=>`<th class="${c.lft?'lft':''}" data-k="${c.k}">${c.t}</th>`).join('');
  const body=rows.length?rows.map(r=>`<tr>${cols.map(c=>{
    const v=r[c.k]; const cls=(c.warn&&v>0)?'warn':(c.net?'netcell':(c.lft?'lft':''));
    return `<td class="${cls}">${c.fmt?c.fmt(v):fmt(v)}</td>`;}).join('')}</tr>`).join('')
    :`<tr><td class="empty" colspan="${cols.length}">Ingen aktivitet i perioden</td></tr>`;
  const foot=totals?`<tfoot><tr>${cols.map(c=>{
    const v=totals[c.k]; return `<td class="${c.lft?'lft':''} ${c.net?'netcell':''}">${c.k==='namn'?'Total':(c.fmt?c.fmt(v):fmt(v))}</td>`;}).join('')}</tr></tfoot>`:'';
  return `<table><thead><tr>${head}</tr></thead><tbody>${body}</tbody>${foot}</table>`;
}

function dateFilter(min,max){
  const single=state.from===state.to;
  return `<div class="filterbar"><div class="datefields">
    <label>Från<input type="date" id="from" value="${state.from}" min="${min}" max="${state.to}"></label>
    <label>Till<input type="date" id="to" value="${state.to}" min="${state.from}" max="${max}"></label></div>
    <div class="presets">
      <button data-p="yesterday">Senaste dagen</button>
      <button data-p="week">Senaste 7 dagar</button>
      <button data-p="month">Denna månad</button>
      <button data-p="all">Allt</button></div>
    <div class="rangelabel">${single?`Visar <b>${state.from}</b>`:`Visar <b>${state.from}</b> – <b>${state.to}</b>`}</div></div>`;
}

function viewOversikt(d){
  const dates=allDates(d);const max=dates[dates.length-1]||'2026-05-28',min=dates[0]||'2026-05-01';
  if(!state.from){state.from=max.slice(0,8)+'01';state.to=max;}
  const sales=agg(d.sales,state.from,state.to),anger=agg(d.anger,state.from,state.to);
  const nek=d.hasNekade?agg(d.nekade,state.from,state.to):null;
  const single=state.from===state.to;
  const gt=g=>{const so=Object.values(sales.bySeller[g]||{}).reduce((a,b)=>a+b,0);
    const an=Object.values(anger.bySeller[g]||{}).reduce((a,b)=>a+b,0);
    const ne=nek?Object.values(nek.bySeller[g]||{}).reduce((a,b)=>a+b,0):0;return{so,an,ne,netto:so-an-ne};};
  const allT=d.groups.reduce((a,g)=>{const t=gt(g);a.so+=t.so;a.an+=t.an;a.ne+=t.ne;a.netto+=t.netto;return a;},{so:0,an:0,ne:0,netto:0});
  const totalCard=`<div class="card total"><div class="card-bar" style="background:linear-gradient(135deg,#1B0638 0%,#461886 100%)"></div><div class="card-h">Totalt</div>
    <div class="card-net">${fmt(allT.netto)}</div><div class="card-sub">netto alla grupper</div>
    <div class="card-row"><span>Sålt</span><b>${fmt(allT.so)}</b></div><div class="card-row"><span>Ånger</span><b>${fmt(allT.an)}</b></div>
    ${d.hasNekade?`<div class="card-row"><span>Nekade</span><b>${fmt(allT.ne)}</b></div>`:''}
    <div class="card-row"><span>Ånger&nbsp;%</span><b>${pctv(allT.an,allT.so)}</b></div></div>`;
  const kpis=d.groups.map(g=>{const t=gt(g);return `<div class="card"><div class="card-bar" style="background:${GRAD[g]}"></div><div class="card-h">${lbl(g)}</div>
    <div class="card-net">${fmt(t.netto)}</div><div class="card-sub">netto</div>
    <div class="card-row"><span>Sålt</span><b>${fmt(t.so)}</b></div><div class="card-row"><span>Ånger</span><b>${fmt(t.an)}</b></div>
    ${d.hasNekade?`<div class="card-row"><span>Nekade</span><b>${fmt(t.ne)}</b></div>`:''}
    <div class="card-row"><span>Ånger&nbsp;%</span><b>${pctv(t.an,t.so)}</b></div></div>`;}).join('');
  const days=dates.filter(x=>x>=state.from&&x<=state.to);const maxV=Math.max(1,...days.map(x=>sales.byDay[x]||0));
  const trend=(!single&&days.length>1)?`<div class="panel"><div class="panel-h">Försäljning per dag</div><div class="bars">${days.map(x=>{const v=sales.byDay[x]||0;return `<div class="bar-col" title="${x}: ${v}"><div class="bar" style="height:${(v/maxV)*100}%"></div><span class="bar-lbl">${x.slice(8)}</span></div>`;}).join('')}</div></div>`:'';
  const tbl=g=>{const names=new Set([...Object.keys(sales.bySeller[g]||{}),...Object.keys(anger.bySeller[g]||{}),...(nek?Object.keys(nek.bySeller[g]||{}):[])]);
    let rows=[...names].filter(matchSearch).map(s=>{const so=(sales.bySeller[g]||{})[s]||0,an=(anger.bySeller[g]||{})[s]||0,ne=nek?(nek.bySeller[g]||{})[s]||0:0;return{namn:s,so,an,ne,netto:so-an-ne};});
    sortRows(rows);const t=gt(g);
    const cols=[{k:'namn',t:'Säljare',lft:1},{k:'so',t:'Sålt'},{k:'an',t:'Ånger',warn:1}];
    if(d.hasNekade)cols.push({k:'ne',t:'Nekade',warn:1});cols.push({k:'netto',t:'Netto',net:1});
    return `<div class="panel"><div class="panel-h"><span class="grpdot" style="background:${GRAD[g]}"></span>${lbl(g)} – säljare<span class="count">${rows.length} st</span></div>${tableHTML(cols,rows,{namn:'Total',so:t.so,an:t.an,ne:t.ne,netto:t.netto})}</div>`;};
  return `<h2 class="sec-title">Översikt</h2>${dateFilter(min,max)}
    <div class="kpis">${totalCard}${kpis}</div>${trend}<div class="tables">${d.groups.map(tbl).join('')}</div>`;
}

function viewTopp(d){
  const dates=allDates(d);const max=dates[dates.length-1]||'2026-05-28',min=dates[0]||'2026-05-01';
  if(!state.from){state.from=max.slice(0,8)+'01';state.to=max;}
  const sales=agg(d.sales,state.from,state.to),anger=agg(d.anger,state.from,state.to);
  const nek=d.hasNekade?agg(d.nekade,state.from,state.to):null;
  const medal=i=>i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);
  const groupList=g=>{
    const names=new Set([...Object.keys(sales.bySeller[g]||{}),...Object.keys(anger.bySeller[g]||{}),...(nek?Object.keys(nek.bySeller[g]||{}):[])]);
    const rows=[];
    for(const s of names){if(!matchSearch(s))continue;const so=(sales.bySeller[g]||{})[s]||0,an=(anger.bySeller[g]||{})[s]||0,ne=nek?(nek.bySeller[g]||{})[s]||0:0;rows.push({namn:s,so,an,ne,netto:so-an-ne});}
    rows.sort((a,b)=>b.netto-a.netto);
    const body=rows.length?rows.map((r,i)=>`<tr class="${i<3?'podium p'+i:''}"><td class="rank">${medal(i)}</td><td class="lft">${r.namn}</td><td>${fmt(r.so)}</td><td class="${r.an>0?'warn':''}">${fmt(r.an)}</td>${d.hasNekade?`<td class="${r.ne>0?'warn':''}">${fmt(r.ne)}</td>`:''}<td class="netcell">${fmt(r.netto)}</td></tr>`).join('')
      :`<tr><td class="empty" colspan="${d.hasNekade?6:5}">Ingen aktivitet i perioden</td></tr>`;
    return `<div class="panel"><div class="panel-h"><span class="grpdot" style="background:${GRAD[g]}"></span>${lbl(g)} – topplista<span class="count">${rows.length} st</span></div>
      <table><thead><tr><th class="rank">#</th><th class="lft">Säljare</th><th>Sålt</th><th>Ånger</th>${d.hasNekade?'<th>Nekade</th>':''}<th>Netto</th></tr></thead><tbody>${body}</tbody></table></div>`;
  };
  return `<h2 class="sec-title">Topplista per grupp</h2>${dateFilter(min,max)}<div class="tables">${d.groups.map(groupList).join('')}</div>`;
}

function viewDaglig(d){
  const dates=allDates(d);const max=dates[dates.length-1]||'2026-05-28',min=dates[0]||'2026-05-01';
  if(!state.from){state.from=max.slice(0,8)+'01';state.to=max;}
  const inRange=dt=>dt>=state.from&&dt<=state.to;
  const filtered=dates.filter(inRange);
  const byMonth={};
  for(const dt of filtered){const ym=dt.slice(0,7);(byMonth[ym]=byMonth[ym]||[]).push(dt);}
  // Per-group aggregations: group -> date -> count
  const sales={},anger={},nek={};
  for(const g of d.groups){sales[g]={};anger[g]={};nek[g]={};}
  for(const[g,s,dt,n]of d.sales){if(!matchSearch(s)||!inRange(dt))continue;sales[g][dt]=(sales[g][dt]||0)+n;}
  for(const[g,s,dt,n]of d.anger){if(!matchSearch(s)||!inRange(dt))continue;anger[g][dt]=(anger[g][dt]||0)+n;}
  if(d.hasNekade)for(const[g,s,dt,n]of d.nekade){if(!matchSearch(s)||!inRange(dt))continue;nek[g][dt]=(nek[g][dt]||0)+n;}
  // helper: build a panel for one group OR for total
  const buildPanel=(grpKey,label,grad)=>{
    const sectionRows=Object.keys(byMonth).sort().reverse().map(ym=>{
      const days=byMonth[ym].sort().reverse();
      const getVal=(map,dt)=>{
        if(grpKey==='__total__'){let t=0;for(const g of d.groups)t+=(map[g]||{})[dt]||0;return t;}
        return (map[grpKey]||{})[dt]||0;
      };
      const dayRows=days.map(dt=>{
        const so=getVal(sales,dt),an=getVal(anger,dt),ne=d.hasNekade?getVal(nek,dt):0;
        const dayName=['sön','mån','tis','ons','tors','fre','lör'][new Date(dt).getDay()];
        return `<tr><td class="lft">${dt} <span class="dayname">${dayName}</span></td><td>${fmt(so)}</td><td class="${an>0?'warn':''}">${fmt(an)}</td>${d.hasNekade?`<td class="${ne>0?'warn':''}">${fmt(ne)}</td>`:''}<td class="netcell">${fmt(so-an-ne)}</td></tr>`;
      }).join('');
      const tot=days.reduce((a,dt)=>{a.so+=getVal(sales,dt);a.an+=getVal(anger,dt);a.ne+=d.hasNekade?getVal(nek,dt):0;return a;},{so:0,an:0,ne:0});
      const [y,m]=ym.split('-');const ymLabel=MNAMES[Number(m)]+' '+y;
      return `<div class="subpanel"><div class="subpanel-h">${ymLabel}<span class="count">${days.length} dagar</span></div>
        <table><thead><tr><th class="lft">Datum</th><th>Sålt</th><th>Ånger</th>${d.hasNekade?'<th>Nekade</th>':''}<th>Netto</th></tr></thead>
        <tbody>${dayRows}</tbody>
        <tfoot><tr><td class="lft">Summa ${ymLabel}</td><td>${fmt(tot.so)}</td><td>${fmt(tot.an)}</td>${d.hasNekade?`<td>${fmt(tot.ne)}</td>`:''}<td class="netcell">${fmt(tot.so-tot.an-tot.ne)}</td></tr></tfoot></table></div>`;
    }).join('');
    return `<div class="panel"><div class="panel-h"><span class="grpdot" style="background:${grad}"></span>${label}</div>${sectionRows||'<div class="empty-pad">Ingen aktivitet i valt datumintervall</div>'}</div>`;
  };
  const totalGrad='linear-gradient(135deg,#1B0638 0%,#461886 100%)';
  const groupPanels=d.groups.map(g=>buildPanel(g,lbl(g),GRAD[g])).join('');
  const totalPanel=buildPanel('__total__','Totalt',totalGrad);
  return `<h2 class="sec-title">Daglig aktivitet</h2>${dateFilter(min,max)}<p class="note">Aktivitet per dag, grupperat per månad och affärsområde${state.search?' – filtrerat på "'+state.search+'"':''}.</p>${totalPanel}${groupPanels}`;
}

function viewNC(d){
  const months=allMonths(d);if(!state.month)state.month=months[months.length-1];const sel=state.month;
  const tbl=ag=>{const rs=(d.nc||[]).filter(r=>r[0]===ag&&r[2]===sel&&matchSearch(r[1]));
    let rows=rs.map(r=>({namn:r[1],avtal:r[4],snitt:r[4]?Math.round(r[3]/r[4]):0}));
    sortKey=sortKey==='netto'?'snitt':sortKey;sortRows(rows);
    const allrs=(d.nc||[]).filter(r=>r[0]===ag&&r[2]===sel);
    const tot=allrs.reduce((a,r)=>{a.s+=r[3];a.c+=r[4];return a;},{s:0,c:0});
    const cols=[{k:'namn',t:'Säljare',lft:1},{k:'avtal',t:'Avtal'},{k:'snitt',t:'Snitt NC',fmt:kr}];
    return `<div class="panel"><div class="panel-h"><span class="grpdot" style="background:${GRAD[ag]}"></span>${lbl(ag)} – NC<span class="count">${rows.length} st</span></div>${tableHTML(cols,rows,{namn:'Total',avtal:tot.c,snitt:tot.c?Math.round(tot.s/tot.c):0})}</div>`;};
  return `<h2 class="sec-title">NC – snittpris per säljare (${mlabel(sel)})</h2>${monthBar(months)}<div class="tables">${d.groups.map(tbl).join('')}</div>`;
}

function viewCohort(d,kind){
  const months=allMonths(d);if(!state.month)state.month=months[months.length-1];const sel=state.month;
  const isAng=kind==='anger';
  const tbl=g=>{const rs=(d.cohort||[]).filter(r=>r[0]===g&&r[2]===sel&&matchSearch(r[1]));
    let rows=rs.map(r=>{const sold=r[3],ev=isAng?r[4]:r[5];return{namn:r[1],sold,ev,netto:sold-ev,pct:sold?ev/sold:null};});
    sortKey=(sortKey==='snitt')?'netto':sortKey;sortRows(rows);
    const allrs=(d.cohort||[]).filter(r=>r[0]===g&&r[2]===sel);
    const tot=allrs.reduce((a,r)=>{a.sold+=r[3];a.ev+=(isAng?r[4]:r[5]);return a;},{sold:0,ev:0});
    const cols=[{k:'namn',t:'Säljare',lft:1},{k:'sold',t:'Sålt'},{k:'ev',t:isAng?'Ånger':'Nekade',warn:1},{k:'netto',t:'Netto',net:1},{k:'pct',t:isAng?'Ånger %':'Nekade %',fmt:v=>v==null?'–':(v*100).toFixed(1)+' %'}];
    return `<div class="panel"><div class="panel-h"><span class="grpdot" style="background:${GRAD[g]}"></span>${lbl(g)}<span class="count">${rows.length} st</span></div>${tableHTML(cols,rows,{namn:'Total',sold:tot.sold,ev:tot.ev,netto:tot.sold-tot.ev,pct:tot.sold?tot.ev/tot.sold:null})}</div>`;};
  const title=isAng?'Ånger – innevarande försäljning':'Nekade porteringar – innevarande försäljning';
  return `<h2 class="sec-title">${title} (${mlabel(sel)})</h2>${monthBar(months)}<p class="note">Avser avtal sålda i ${mlabel(sel)} och hur många av dem som ${isAng?'ångrats':'fått nekad portering'}.</p><div class="tables">${d.groups.map(tbl).join('')}</div>`;
}

function viewManad(d){
  const dates=allDates(d);const max=dates[dates.length-1]||'2026-05-28',min=dates[0]||'2026-05-01';
  if(!state.from){state.from=max.slice(0,8)+'01';state.to=max;}
  const fromYM=Number(state.from.slice(0,4)+state.from.slice(5,7)),toYM=Number(state.to.slice(0,4)+state.to.slice(5,7));
  const monthsSet=new Set();d.sales.forEach(r=>monthsSet.add(Number(r[2].slice(0,4)+r[2].slice(5,7))));
  const months=[...monthsSet].filter(m=>m>=fromYM&&m<=toYM).sort();
  const inRange=dt=>dt>=state.from&&dt<=state.to;
  const monthBucket=(rows)=>{const m={};for(const[g,s,dt,n]of rows){if(!matchSearch(s)||!inRange(dt))continue;const ym=Number(dt.slice(0,4)+dt.slice(5,7));(m[g]=m[g]||{})[ym]=(m[g][ym]||0)+n;}return m;};
  const sM=monthBucket(d.sales),aM=monthBucket(d.anger),nM=d.hasNekade?monthBucket(d.nekade):null;
  // helper: build table for one group OR for 'total' (sum across all groups)
  const tbl=(label,getValues)=>{
    const rows=months.map(ym=>{const{so,an,ne}=getValues(ym);return{namn:mlabel(ym),so,an,ne,netto:so-an-ne};});
    rows.forEach((r,i)=>{if(i===0){r.chg=null;}else{const prev=rows[i-1].netto;r.chg=prev===0?null:(r.netto-prev)/prev;}});
    const cols=[{k:'namn',t:'Månad',lft:1},{k:'so',t:'Brutto'},{k:'an',t:'Ånger',warn:1}];
    if(d.hasNekade)cols.push({k:'ne',t:'Nekade',warn:1});cols.push({k:'netto',t:'Netto',net:1});
    const fmtchg=v=>v==null?'–':`<span class="${v>=0?'up':'down'}">${v>=0?'▲':'▼'} ${(Math.abs(v)*100).toFixed(0)}%</span>`;
    const body=rows.length?rows.map(r=>`<tr>${cols.map(c=>{const v=r[c.k];const cls=(c.warn&&v>0)?'warn':(c.net?'netcell':(c.lft?'lft':''));return `<td class="${cls}">${fmt(v)}</td>`;}).join('')}<td class="chgcell">${fmtchg(r.chg)}</td></tr>`).join('')
      :`<tr><td class="empty" colspan="${cols.length+1}">Inga månader i valt datumintervall</td></tr>`;
    const tot=rows.reduce((a,r)=>{a.so+=r.so;a.an+=r.an;a.ne+=r.ne;a.netto+=r.netto;return a;},{so:0,an:0,ne:0,netto:0});
    const foot=`<tfoot><tr><td class="lft">Total</td><td>${fmt(tot.so)}</td><td>${fmt(tot.an)}</td>${d.hasNekade?`<td>${fmt(tot.ne)}</td>`:''}<td class="netcell">${fmt(tot.netto)}</td><td></td></tr></tfoot>`;
    return `<table><thead><tr>${cols.map(c=>`<th class="${c.lft?'lft':''}">${c.t}</th>`).join('')}<th>Δ Netto</th></tr></thead><tbody>${body}</tbody>${foot}</table>`;
  };
  // Total panel
  const totalGet=ym=>{let so=0,an=0,ne=0;for(const g of d.groups){so+=(sM[g]||{})[ym]||0;an+=(aM[g]||{})[ym]||0;ne+=nM?(nM[g]||{})[ym]||0:0;}return{so,an,ne};};
  const totalPanel=`<div class="panel"><div class="panel-h"><span class="grpdot" style="background:linear-gradient(135deg,#1B0638 0%,#461886 100%)"></span>Totalt – per månad</div>${tbl('Totalt',totalGet)}</div>`;
  const groupPanels=d.groups.map(g=>{
    const get=ym=>({so:(sM[g]||{})[ym]||0,an:(aM[g]||{})[ym]||0,ne:nM?(nM[g]||{})[ym]||0:0});
    return `<div class="panel"><div class="panel-h"><span class="grpdot" style="background:${GRAD[g]}"></span>${lbl(g)} – per månad</div>${tbl(lbl(g),get)}</div>`;
  }).join('');
  return `<h2 class="sec-title">Per månad</h2>${dateFilter(min,max)}${totalPanel}<div class="tables">${groupPanels}</div>`;
}

function viewTrend(d){
  const dates=allDates(d);const max=dates[dates.length-1]||'2026-05-28',min=dates[0]||'2026-05-01';
  // Default: show all months (not just current month)
  if(!state.from){state.from=min;state.to=max;}
  const fromYM=Number(state.from.slice(0,4)+state.from.slice(5,7)),toYM=Number(state.to.slice(0,4)+state.to.slice(5,7));
  const inRange=dt=>dt>=state.from&&dt<=state.to;
  const monthsSet=new Set();d.sales.forEach(r=>monthsSet.add(Number(r[2].slice(0,4)+r[2].slice(5,7))));
  const months=[...monthsSet].filter(m=>m>=fromYM&&m<=toYM).sort();
  const bucket=rows=>{const m={};for(const[g,s,dt,n]of rows){if(!matchSearch(s)||!inRange(dt))continue;const ym=Number(dt.slice(0,4)+dt.slice(5,7));(m[g]=m[g]||{})[ym]=(m[g][ym]||0)+n;}return m;};
  const sM=bucket(d.sales),aM=bucket(d.anger),nM=d.hasNekade?bucket(d.nekade):null;
  // For "total" we sum across all groups
  const getVals=(g,metric)=>{
    if(g==='__total__'){
      return months.map(ym=>{let so=0,an=0,ne=0;for(const gg of d.groups){so+=(sM[gg]||{})[ym]||0;an+=(aM[gg]||{})[ym]||0;ne+=nM?(nM[gg]||{})[ym]||0:0;}
        if(metric==='netto')return so-an-ne;if(metric==='angerpct')return so?(an/so*100):0;return so;});
    }
    return months.map(ym=>{const so=(sM[g]||{})[ym]||0,an=(aM[g]||{})[ym]||0,ne=nM?(nM[g]||{})[ym]||0:0;
      if(metric==='netto')return so-an-ne;if(metric==='angerpct')return so?(an/so*100):0;return so;});
  };
  const totalGrad='linear-gradient(135deg,#1B0638 0%,#461886 100%)';
  const chart=(g,metric)=>{
    const isTotal=g==='__total__';
    const title=isTotal?'Totalt':lbl(g);
    const grad=isTotal?totalGrad:GRAD[g];
    if(!months.length)return `<div class="panel"><div class="panel-h"><span class="grpdot" style="background:${grad}"></span>${title} – ${metric==='netto'?'netto':'ånger %'} per månad</div><div class="empty-pad">Inga månader i valt datumintervall</div></div>`;
    const vals=getVals(g,metric);
    const maxV=Math.max(1,...vals.map(Math.abs));
    const bars=months.map((ym,i)=>{const v=vals[i];const h=(Math.abs(v)/maxV)*100;
      const lab=metric==='angerpct'?v.toFixed(1)+'%':fmt(Math.round(v));
      return `<div class="bar-col" title="${mlabel(ym)}: ${lab}"><span class="bar-val">${lab}</span><div class="bar" style="height:${h}%;background:${metric==='angerpct'?'linear-gradient(180deg,#CB29B4,#F786B9)':grad}"></div><span class="bar-lbl">${MNAMES[ym%100]}</span></div>`;}).join('');
    return `<div class="panel"><div class="panel-h"><span class="grpdot" style="background:${grad}"></span>${title} – ${metric==='netto'?'netto':'ånger %'} per månad</div><div class="bars tall">${bars}</div></div>`;
  };
  // Total panel(s) first, then group panels
  const allGroups=['__total__',...d.groups];
  let ncSection='';
  if(d.nc&&d.nc.length){
    const ncMonths=[...new Set(d.nc.map(r=>r[2]))].filter(m=>m>=fromYM&&m<=toYM).sort();
    const ncChart=g=>{
      const isTotal=g==='__total__';
      const title=isTotal?'Totalt':lbl(g);
      const grad=isTotal?totalGrad:GRAD[g];
      if(!ncMonths.length)return `<div class="panel"><div class="panel-h"><span class="grpdot" style="background:${grad}"></span>${title} – snitt NC per månad</div><div class="empty-pad">Inga månader i valt datumintervall</div></div>`;
      const vals=ncMonths.map(ym=>{
        const rs=isTotal?d.nc.filter(r=>r[2]===ym&&matchSearch(r[1])):d.nc.filter(r=>r[0]===g&&r[2]===ym&&matchSearch(r[1]));
        const s=rs.reduce((a,r)=>a+r[3],0),c=rs.reduce((a,r)=>a+r[4],0);return c?Math.round(s/c):0;
      });
      const maxV=Math.max(1,...vals);
      const bars=ncMonths.map((ym,i)=>{const v=vals[i];const h=(v/maxV)*100;
        return `<div class="bar-col" title="${mlabel(ym)}: ${v} kr"><span class="bar-val">${v} kr</span><div class="bar" style="height:${h}%;background:${grad}"></div><span class="bar-lbl">${MNAMES[ym%100]}</span></div>`;}).join('');
      return `<div class="panel"><div class="panel-h"><span class="grpdot" style="background:${grad}"></span>${title} – snitt NC per månad</div><div class="bars tall">${bars}</div></div>`;
    };
    ncSection=`<div class="tables">${allGroups.map(ncChart).join('')}</div>`;
  }
  return `<h2 class="sec-title">Trender per månad</h2>${dateFilter(min,max)}
    <div class="tables">${allGroups.map(g=>chart(g,'netto')).join('')}</div>
    <div class="tables">${allGroups.map(g=>chart(g,'angerpct')).join('')}</div>${ncSection}`;
}

function monthBar(months){
  const idx=months.indexOf(state.month);
  const prevD=idx<=0?'disabled':'',nextD=idx>=months.length-1?'disabled':'';
  return `<div class="filterbar monthnav"><button id="mprev" class="navarrow" ${prevD}>◀</button>
    <label class="mlab">Månad<select id="monthsel">${months.map(m=>`<option value="${m}" ${m===state.month?'selected':''}>${mlabel(m)}</option>`).join('')}</select></label>
    <button id="mnext" class="navarrow" ${nextD}>▶</button>
    <span class="rangelabel">Visar <b>${mlabel(state.month)}</b></span></div>`;
}

function renderSection(d,sec){
  if(sec==='oversikt')return viewOversikt(d);
  if(sec==='topp')return viewTopp(d);
  if(sec==='nc')return viewNC(d);
  if(sec==='anger')return viewCohort(d,'anger');
  if(sec==='nekade')return viewCohort(d,'nekade');
  if(sec==='nettoInne')return viewNettoB2B(d,'innevarande');
  if(sec==='nettoTot')return viewNettoB2B(d,'totalt');
  if(sec==='daglig')return viewDaglig(d);
  if(sec==='manad')return viewManad(d);
  if(sec==='trend')return viewTrend(d);
  return '';
}

// ---------- Netto-vyer (fungerar för både B2B och B2C) ----------
function viewNettoB2B(d,mode){
  const months=allMonths(d);if(!state.month)state.month=months[months.length-1];const sel=state.month;
  const isInne=mode==='innevarande';
  const hasNek=d.hasNekade;
  function gatherTotalt(ag){
    const sales={},anger={},nek={};
    const ymStr=String(sel);const y=ymStr.slice(0,4),m=ymStr.slice(4,6);
    const isYM=dt=>dt.slice(0,4)===y && dt.slice(5,7)===m;
    for(const[g,s,dt,n]of d.sales){if(g!==ag||!isYM(dt))continue;sales[s]=(sales[s]||0)+n;}
    for(const[g,s,dt,n]of d.anger){if(g!==ag||!isYM(dt))continue;anger[s]=(anger[s]||0)+n;}
    if(hasNek)for(const[g,s,dt,n]of d.nekade){if(g!==ag||!isYM(dt))continue;nek[s]=(nek[s]||0)+n;}
    return{sales,anger,nek};
  }
  function gatherInnevarande(ag){
    const sales={},anger={},nek={};
    for(const c of (d.cohort||[])){if(c[0]!==ag||c[2]!==sel)continue;
      sales[c[1]]=(sales[c[1]]||0)+c[3];
      anger[c[1]]=(anger[c[1]]||0)+c[4];
      if(hasNek&&c.length>5)nek[c[1]]=(nek[c[1]]||0)+c[5];}
    return{sales,anger,nek};
  }
  const tbl=ag=>{const {sales,anger,nek}=isInne?gatherInnevarande(ag):gatherTotalt(ag);
    const names=new Set([...Object.keys(sales),...Object.keys(anger),...(hasNek?Object.keys(nek):[])]);
    let rows=[...names].filter(matchSearch).map(s=>{const so=sales[s]||0,an=anger[s]||0,ne=hasNek?(nek[s]||0):0;return{namn:s,so,an,ne,netto:so-an-ne};});
    rows=rows.filter(r=>r.netto>=1);
    sortRows(rows);
    const tot=rows.reduce((a,r)=>{a.so+=r.so;a.an+=r.an;a.ne+=r.ne;a.netto+=r.netto;return a;},{so:0,an:0,ne:0,netto:0});
    const cols=[{k:'namn',t:'Säljare',lft:1},{k:'so',t:'Sålt'},{k:'an',t:'Ånger',warn:1}];
    if(hasNek)cols.push({k:'ne',t:'Nekade',warn:1});
    cols.push({k:'netto',t:'Netto',net:1});
    return `<div class="panel"><div class="panel-h"><span class="grpdot" style="background:${GRAD[ag]}"></span>${lbl(ag)} – Netto ${isInne?'innevarande':'totalt'}<span class="count">${rows.length} st</span></div>${tableHTML(cols,rows,{namn:'Total',so:tot.so,an:tot.an,ne:tot.ne,netto:tot.netto})}</div>`;};
  const title=isInne?'Netto Innevarande':'Netto Totalt';
  const desc=isInne
    ?`Avtal sålda i ${mlabel(sel)} och hur många av <b>just dessa</b> som ångrats${hasNek?' eller fått nekad portering':''} (kohortvy). Visar endast säljare med netto ≥ 1.`
    :`Avtal sålda i ${mlabel(sel)} och alla ångringar${hasNek?'/nekade porteringar':''} <b>registrerade i ${mlabel(sel)}</b> – oavsett när avtalen ursprungligen såldes. Visar endast säljare med netto ≥ 1.`;
  return `<h2 class="sec-title">${title} (${mlabel(sel)})</h2>${monthBar(months)}<p class="note">${desc}</p><div class="tables">${d.groups.map(tbl).join('')}</div>`;
}

function render(){
  const d=STORE[TAB];const secs=SECTIONS[TAB];
  const nav=`<button class="${SEC==='allt'?'on':''}" data-s="allt">Allt</button>`+secs.map(([k,t])=>`<button class="${SEC===k?'on':''}" data-s="${k}">${t}</button>`).join('');
  let content;
  if(SEC==='allt'){content=secs.map(([k])=>`<section class="block">${renderSection(d,k)}</section>`).join('');}
  else{content=renderSection(d,SEC);}
  const searchBar=`<div class="searchbar"><input type="text" id="globalSearch" placeholder="🔍 Sök säljare (filtrerar alla vyer)…" value="${state.search}"></div>`;
  document.getElementById('app').innerHTML=`<div class="layout"><aside class="sidenav"><div class="nav-h">Vyer</div>${nav}</aside><main class="content">${searchBar}${content}</main></div>`;
  wire(d);
}

function wire(d){
  document.querySelectorAll('.sidenav button').forEach(b=>b.onclick=()=>{
    const newSec=b.dataset.s;
    // When entering Trender, reset to all-time so older months are visible
    if(newSec==='trend'){const dates=allDates(d);if(dates.length){state.from=dates[0];state.to=dates[dates.length-1];}}
    SEC=newSec;render();
  });
  const f=document.getElementById('from'),t=document.getElementById('to');
  if(f)f.onchange=e=>{state.from=e.target.value;if(state.to<state.from)state.to=state.from;render();};
  if(t)t.onchange=e=>{state.to=e.target.value;if(state.from>state.to)state.from=state.to;render();};
  document.querySelectorAll('.presets button').forEach(b=>b.onclick=()=>{const p=b.dataset.p;const dates=allDates(d);const max=dates[dates.length-1],min=dates[0];
    if(p==='month'){state.from=max.slice(0,8)+'01';state.to=max;}
    else if(p==='yesterday'){state.from=dates[dates.length-1];state.to=state.from;}
    else if(p==='week'){const i=dates.length-1;state.from=dates[Math.max(0,i-6)];state.to=dates[i];}
    else{state.from=min;state.to=max;}render();});
  const ms=document.getElementById('monthsel');if(ms)ms.onchange=e=>{state.month=Number(e.target.value);render();};
  const mp=document.getElementById('mprev'),mn=document.getElementById('mnext');
  if(mp||mn){const months=allMonths(d);const i=months.indexOf(state.month);
    if(mp)mp.onclick=()=>{if(i>0){state.month=months[i-1];render();}};
    if(mn)mn.onclick=()=>{if(i<months.length-1){state.month=months[i+1];render();}};}
  document.querySelectorAll('thead th[data-k]').forEach(th=>th.onclick=()=>{const k=th.dataset.k;if(k===sortKey)sortDir*=-1;else{sortKey=k;sortDir=-1;}render();});
  const gs=document.getElementById('globalSearch');
  if(gs){gs.oninput=e=>{state.search=e.target.value;render();setTimeout(()=>{const ngs=document.getElementById('globalSearch');if(ngs){ngs.focus();ngs.setSelectionRange(state.search.length,state.search.length);}},0);};}
}

function setTab(tab){TAB=tab;SEC='oversikt';state.from=null;state.to=null;state.month=null;sortKey='netto';sortDir=-1;
  document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('on',b.dataset.t===tab));render();}

function handleFile(file){const status=document.getElementById('status');status.textContent='Läser '+file.name+' …';status.className='status busy';
  const reader=new FileReader();reader.onload=e=>{try{const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array',cellDates:true});
    const res=detectAndParse(wb);if(!res||!res.data){status.textContent='Kände inte igen filen.';status.className='status err';return;}
    STORE[res.biz]=res.data;
    status.textContent='✓ '+res.biz.toUpperCase()+' uppdaterad lokalt (denna session)';status.className='status ok';setTab(res.biz);
  }catch(err){status.textContent='Fel: '+err.message;status.className='status err';}};reader.readAsArrayBuffer(file);}
function initUpload(){const inp=document.getElementById('fileinp'),drop=document.getElementById('drop');
  inp.onchange=e=>{for(const f of e.target.files)handleFile(f);};
  ['dragover','dragenter'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('hot');}));
  ['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove('hot');}));
  drop.addEventListener('drop',e=>{for(const f of e.dataTransfer.files)handleFile(f);});}
document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>setTab(b.dataset.t));
initUpload();render();

</script></body></html>
